<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- Bangla (bn) Font Configuration -->

    <!-- Hijack Chrome/Edge hardcoded Noto preference for Bengali -->
    <match target="pattern">
        <test name="family" compare="contains">
            <string>Noto Sans Bengali</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Kalpurush</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="family" compare="contains">
            <string>Noto Serif Bengali</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Kalpurush</string>
        </edit>
    </match>

    <!-- Match for both sans-serif and serif fonts -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>bn</string>
        </test>
        <alias>
            <family>sans-serif</family>
            <prefer>
                <family>Kalpurush</family>
                <family>Noto Sans Bengali</family> <!-- Additional fallback font -->
                <family>Lohit Bengali</family> <!-- Additional fallback font -->
            </prefer>
        </alias>
    </match>

    <match target="pattern">
        <test name="lang" compare="contains">
            <string>bn</string>
        </test>
        <alias>
            <family>serif</family>
            <prefer>
                <family>Kalpurush</family>
                <family>Noto Serif Bengali</family> <!-- Additional fallback font -->
                <family>Siyam Rupali</family> <!-- Additional fallback font -->
            </prefer>
        </alias>
    </match>

    <!-- Generic Fallback broadly mapping Indic requests -->
    <match target="pattern">
        <test name="family" compare="eq">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="append" binding="weak">
            <string>Kalpurush</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="family" compare="eq">
            <string>serif</string>
        </test>
        <edit name="family" mode="append" binding="weak">
            <string>Kalpurush</string>
        </edit>
    </match>

    <!-- Bangla (bn) Font Configuration Ends -->
</fontconfig>
